<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PolicyForge Production System Architecture</title>
  <desc id="desc">A simple production architecture diagram showing frontend, API gateway, policy ingestion, compiler, runtime enforcement, evidence, replay, recall, data stores, integrations, and observability.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .panel { fill: #ffffff; stroke: #d9e0ea; stroke-width: 2; }
      .panel-soft { fill: #fbfcff; stroke: #d9e0ea; stroke-width: 2; }
      .core { fill: #eef4ff; stroke: #adc4f6; stroke-width: 2.4; }
      .data { fill: #f7f9fc; stroke: #cbd5e1; stroke-width: 2; }
      .integration { fill: #f8fbf8; stroke: #bed9c8; stroke-width: 2; }
      .security { fill: #fff8ed; stroke: #e7c581; stroke-width: 2; }
      .line { fill: none; stroke: #8b98ac; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .line-strong { fill: none; stroke: #456bd6; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .title { fill: #172033; font: 700 34px Inter, Segoe UI, Arial, sans-serif; letter-spacing: -0.02em; }
      .subtitle { fill: #657084; font: 500 16px Inter, Segoe UI, Arial, sans-serif; }
      .group-label { fill: #536177; font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .label { fill: #1f2a3f; font: 700 18px Inter, Segoe UI, Arial, sans-serif; }
      .small { fill: #617086; font: 600 13px Inter, Segoe UI, Arial, sans-serif; }
      .tiny { fill: #7a8798; font: 600 11px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
      .pill { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1.5; }
      .accent { fill: #3159d8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#8b98ac"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#456bd6"/>
    </marker>
